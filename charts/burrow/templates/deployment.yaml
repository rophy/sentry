apiVersion: apps/v1
kind: Deployment
metadata:
  name: burrow
  labels:
    app: burrow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: burrow
  template:
    metadata:
      labels:
        app: burrow
    spec:
      containers:
      - name: burrow
        image: vixns/burrow
        # command: ["/bin/sh", "-c", "sleep 3600"]
        ports:
        - containerPort: 8000
        volumeMounts:
        - name: config
          mountPath: "/etc/burrow"
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: burrow
